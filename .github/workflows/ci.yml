name: CI

on:
  push:
  pull_request:

jobs:
  core-only:
    name: Core install (no extras) smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core package only (no anomaly/dev extras)
        run: pip install .
      - name: Verify zero-dependency commands work without scikit-learn
        run: |
          llmledger schema
          llmledger demo-data --out /tmp/demo.jsonl
          llmledger report --log-file /tmp/demo.jsonl
          # demo-data always injects synthetic anomalies, so `detect` finding
          # them (exit 1) is the *expected*, correct outcome here -- this
          # smoke test only cares that the command runs without crashing
          # (exit 2) now that scikit-learn isn't installed. `set +e` is
          # required here: this step runs under `bash -e`, which would
          # otherwise abort on `detect`'s exit 1 before `code=$?` ever runs.
          set +e
          llmledger detect --log-file /tmp/demo.jsonl
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            echo "detect crashed (exit 2) on a core-only install" >&2
            exit 1
          fi

  full:
    name: Full install + tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # requires-python in pyproject.toml is ">=3.9"; test both ends of
        # that range rather than every intermediate version.
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with anomaly + dev extras
        run: pip install -e ".[anomaly,dev]"
      - name: Run tests
        run: pytest tests/ -v
      - name: Extract llmledger's own declared dependencies for audit
        # Scoped to what pyproject.toml actually declares (core `dependencies`
        # + the `anomaly` extra, i.e. scikit-learn) rather than auditing every
        # package in this CI environment: pytest, pip itself, and pip-audit's
        # own transitive deps (requests, urllib3, filelock, msgpack, ...) are
        # dev/test/tooling, not something llmledger ships to users, and their
        # CVEs churn independently of this project.
        run: |
          pip install tomli
          python -c "
          import tomli
          with open('pyproject.toml', 'rb') as f:
              data = tomli.load(f)
          proj = data['project']
          deps = list(proj.get('dependencies', []))
          deps += list(proj.get('optional-dependencies', {}).get('anomaly', []))
          with open('audit-requirements.txt', 'w') as out:
              out.write('\n'.join(deps))
          "
          cat audit-requirements.txt
      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r audit-requirements.txt
